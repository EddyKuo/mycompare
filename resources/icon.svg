<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="leftDoc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d3561"/>
      <stop offset="100%" stop-color="#1e2544"/>
    </linearGradient>
    <linearGradient id="rightDoc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d3561"/>
      <stop offset="100%" stop-color="#1e2544"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- App icon background: rounded square -->
  <rect width="256" height="256" rx="52" ry="52" fill="url(#bg)"/>

  <!-- Left document -->
  <g filter="url(#shadow)">
    <rect x="28" y="44" width="88" height="112" rx="8" ry="8" fill="url(#leftDoc)" stroke="#3d4f8a" stroke-width="1.5"/>
    <!-- Dog-ear fold -->
    <polygon points="96,44 116,44 116,64" fill="#1a1a2e" opacity="0.6"/>
    <polygon points="96,44 116,64 96,64" fill="#4a5fa8"/>
    <!-- Text lines -->
    <rect x="40" y="74" width="52" height="5" rx="2.5" fill="#5b6fc4" opacity="0.8"/>
    <rect x="40" y="86" width="40" height="5" rx="2.5" fill="#5b6fc4" opacity="0.5"/>
    <!-- Diff highlight line (red/pink — deleted) -->
    <rect x="36" y="100" width="68" height="9" rx="3" fill="#e05555" opacity="0.85"/>
    <rect x="40" y="102" width="44" height="5" rx="2.5" fill="#ff8888"/>
    <!-- Normal line -->
    <rect x="40" y="117" width="36" height="5" rx="2.5" fill="#5b6fc4" opacity="0.5"/>
    <rect x="40" y="129" width="48" height="5" rx="2.5" fill="#5b6fc4" opacity="0.4"/>
  </g>

  <!-- Right document -->
  <g filter="url(#shadow)">
    <rect x="140" y="100" width="88" height="112" rx="8" ry="8" fill="url(#rightDoc)" stroke="#3d4f8a" stroke-width="1.5"/>
    <!-- Dog-ear fold -->
    <polygon points="208,100 228,100 228,120" fill="#1a1a2e" opacity="0.6"/>
    <polygon points="208,100 228,120 208,120" fill="#4a5fa8"/>
    <!-- Text lines -->
    <rect x="152" y="130" width="52" height="5" rx="2.5" fill="#5b6fc4" opacity="0.8"/>
    <rect x="152" y="142" width="40" height="5" rx="2.5" fill="#5b6fc4" opacity="0.5"/>
    <!-- Diff highlight line (green — inserted) -->
    <rect x="148" y="156" width="68" height="9" rx="3" fill="#2da44e" opacity="0.85"/>
    <rect x="152" y="158" width="44" height="5" rx="2.5" fill="#56d364"/>
    <!-- Normal line -->
    <rect x="152" y="173" width="36" height="5" rx="2.5" fill="#5b6fc4" opacity="0.5"/>
    <rect x="152" y="185" width="48" height="5" rx="2.5" fill="#5b6fc4" opacity="0.4"/>
  </g>

  <!-- Center ≠ symbol -->
  <g transform="translate(128, 128)">
    <!-- Two horizontal bars -->
    <rect x="-18" y="-14" width="36" height="6" rx="3" fill="#f0c040"/>
    <rect x="-18" y="8" width="36" height="6" rx="3" fill="#f0c040"/>
    <!-- Diagonal slash -->
    <line x1="14" y1="-22" x2="-14" y2="22" stroke="#f0c040" stroke-width="5.5" stroke-linecap="round"/>
  </g>
</svg>
